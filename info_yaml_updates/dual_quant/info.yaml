id: 34_dual_quant
title: Dual Quant
release: 34 / 1.0
summary: Dual granular pitch shifter with chromatic quantisation and calibrated pitch CV outputs
description: Dual granular pitch shifter for the Workshop Computer platform with two independent fixed-point pitch shifters, optional chromatic pitch quantisation, CV-controllable pitch shifting, and pitch CV outputs.
panel:
  inputs:
    audio_l:
      label: |-
        Audio
        1
      description: Main audio input into the shared circular buffer.
      source: README
    audio_r:
      label: |-
        Audio
        2
      description: Secondary audio input.
      source: README
    cv_1:
      label: |-
        CV
        1
      description: Additional pitch modulation for output A.
      source: README
    cv_2:
      label: |-
        CV
        2
      description: Additional pitch modulation for output B.
      source: README
  outputs:
    audio_out_l:
      label: |-
        Audio
        1
      description: Pitch-shifted signal A.
      source: README
    audio_out_r:
      label: |-
        Audio
        2
      description: Pitch-shifted signal B.
      source: README
    cv_out_1:
      label: |-
        CV
        1
      description: Quantised pitch voltage A.
      source: README
    cv_out_2:
      label: |-
        CV
        2
      description: Quantised pitch voltage B.
      source: README
    pulse_out_1:
      label: |-
        Pulse
        1
      description: Pulse output.
      source: README
    pulse_out_2:
      label: |-
        Pulse
        2
      description: Pulse output.
      source: README
switch_modes:
  up: Pitch shifting without quantisation.
  middle: Enables chromatic pitch quantisation.
  down: Pitch shifting without quantisation.
leds:
  - "LED feedback shows quantiser state."
notes:
  - "Main controls global pitch offset, X controls pitch offset for output A, and Y controls pitch offset for output B."
  - "The DSP uses fixed-point arithmetic, lookup tables, power-of-two buffer wrapping, no dynamic allocation, and no floating point in the ISR."
  - "The audio character is intentionally rough, lo-fi, granular, smeared, and metallic rather than transparent."
source:
  - dual_quant_pitch.cpp
  - Click.h
  - README.md
