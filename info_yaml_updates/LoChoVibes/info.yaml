id: 58_LoChoVibes
title: LoCho Vibes
release: 58 / 0.1.0
summary: Stereo lo-fi chorus and vibrato with LFO shapes, saturation, compression, and clocking
description: Stereo lo-fi chorus and vibrato effect for the Music Thing Modular Workshop Computer, inspired by unstable pitch movement, stereo widening, saturation, compression-style coloration, and degraded cassette-style modulation.
panel:
  inputs:
    audio_l:
      label: |-
        Audio
        1
      description: Mono summed audio input with Audio In 2.
      source: README
    audio_r:
      label: |-
        Audio
        2
      description: Mono summed audio input with Audio In 1.
      source: README
    cv_1:
      label: |-
        CV
        1
      description: Modulates modulation depth, including stereo width, chorus movement, and vibrato depth.
      source: README
    cv_2:
      label: |-
        CV
        2
      description: Modulates Character between degraded cassette texture, neutral response, and compressed/saturated modulation.
      source: README
  outputs:
    audio_out_l:
      label: |-
        Audio
        1
      description: Left audio output.
      source: README
    audio_out_r:
      label: |-
        Audio
        2
      description: Right audio output.
      source: README
    cv_out_1:
      label: |-
        CV
        1
      description: Main LFO modulation output.
      source: README
    cv_out_2:
      label: |-
        CV
        2
      description: Inverted LFO modulation output.
      source: README
    pulse_out_1:
      label: |-
        Pulse
        1
      description: Pulse output.
      source: README
    pulse_out_2:
      label: |-
        Pulse
        2
      description: Pulse output.
      source: README
switch_modes:
  up: Vibrato mode. Fully wet pitch modulation for unstable tape transport and warped cassette movement.
  middle: Chorus mode. Dry signal remains blended with the delay line for stereo widening and animated movement.
  down: Momentary LFO shape select. Cycles Triangle, Sine, and Random Drift shapes.
leds:
  - "Normal display: LED 1 modulation rate, LED 2 modulation depth, LED 3 lo-fi amount, LED 4 compression amount, LED 5 LFO phase, LED 6 inverted LFO phase."
  - "Shape overlay: Triangle uses LEDs 1-2, Sine uses LEDs 3-4, and Random Drift uses LEDs 5-6."
notes:
  - "Main controls modulation rate, X controls modulation depth, and Y controls Character from Lo-Fi to Compression."
  - "Pulse In 1 is an external LFO clock input. The internal LFO synchronises to incoming clock pulses and falls back to internal clock if pulses stop."
  - "The left and right channels use opposing delay modulation and offset delay times to create stereo widening."
source:
