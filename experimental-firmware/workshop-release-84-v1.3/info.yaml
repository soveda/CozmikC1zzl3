documentation:
  intro: >
    Phase-distortion synth card with Turing machine mode, USB MIDI, browser
    editor tools, CZ Import Lab handoff, gate-held envelope looping, natural
    trigger completion, and audio smoothing for high-PD tones.

    Switch middle is PD synth mode (Main = pitch, X = phase distortion, Y = waveform
    morph). Pulse In 2 and MIDI note-on loop supported envelopes while held;
    gate/note-off lets the envelope complete naturally.

    Hold switch down from middle for performance edit (detune, ring modulation,
    noise/grit) and save.

    Switch up is Turing mode (Main = mutation, X = length, Y = clock speed).

    Turing CV and pulse outputs continue running in synth mode.

    Factory envelope presets are never overwritten; custom envelopes use separate
    browser-stored slots.

    Envelope Lab edits and reads back envelopes and settings. C1ZZL3 Import Lab
    prepares translated Casio CZ drafts for review before sending them on to the
    card.
