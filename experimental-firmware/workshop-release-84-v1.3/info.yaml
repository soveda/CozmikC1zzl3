  middle: 'Z middle: MAIN: Pitch; X: Phase Distortion; Y: Waveform Morph.'
  down: 'Z down, hold: MAIN: Detune; X: Ring Modulation; Y: Noise/Grit.'
leds:
  - "In synth mode: LED 1 shows phase-distortion amount, LED 2 shows waveform position, LED 3 shows oscillator 2 level, LED 4 shows ring modulation amount, LED 5 shows noise amount, and LED 6 lights while the switch is held down."
  - "In Turing mode: LEDs 1-3 show low bits of the Turing pattern, LED 4 follows Pulse In 1, LED 5 shows sequence length, and LED 6 flashes on each Turing clock step."
  - "In startup envelope selection: factory presets use the binary LED display, and custom slots light LED 6 and use LEDs 1-3 for the custom slot number."
notes:
