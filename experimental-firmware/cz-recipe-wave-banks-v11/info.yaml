documentation:
  intro: >
    C1ZZL3 Gnarly is the no-Turing dual-oscillator branch of C1ZZL3. Switch
    middle edits oscillator 1, switch up edits oscillator 2, and switch down
    held edits recipe bank, ring modulation, and noise/grit. It uses the Full
    Dual Oscillator Web MIDI Lab for named sound presets, separate oscillator
    envelopes, recipe-bank settings, and CZ SysEx import handoff.
