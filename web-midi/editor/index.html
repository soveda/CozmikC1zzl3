<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C1ZZL3 Envelope Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">C1ZZL3</p>
        <h1>Envelope Lab</h1>
      </div>
      <div class="transport">
        <button id="audition" type="button" title="Loop browser audition">▶</button>
        <button id="stop" type="button" title="Stop browser audition">■</button>
        <button id="midiToggle" type="button" title="Connect USB MIDI input">MIDI</button>
      </div>
    </header>

    <section class="workspace">
      <aside class="preset-list" aria-label="Envelope presets">
        <div class="list-head">
          <h2>Presets</h2>
          <button id="addPreset" type="button" title="Add preset">+</button>
        </div>
        <div id="presetList" class="preset-buttons"></div>
      </aside>

      <section class="editor" aria-label="Envelope editor">
        <div class="editor-head">
          <label>
            Name
            <input id="presetName" type="text" maxlength="32">
          </label>
          <label>
            MIDI pitch
            <input id="pitchInput" type="number" min="24" max="96" value="60">
          </label>
          <label>
            Preview waveform
            <select id="waveSelect">
              <option value="sine">Sine</option>
              <option value="sawtooth">Saw</option>
              <option value="square">Square</option>
              <option value="triangle">Triangle</option>
            </select>
          </label>
          <label>
            Card slot
            <select id="customSlot">
              <option value="0">Custom 1</option>
              <option value="1">Custom 2</option>
              <option value="2">Custom 3</option>
              <option value="3">Custom 4</option>
              <option value="4">Custom 5</option>
              <option value="5">Custom 6</option>
              <option value="6">Custom 7</option>
              <option value="7">Custom 8</option>
            </select>
          </label>
        </div>

        <div class="curve-panel">
          <canvas id="curveCanvas" width="1200" height="420" aria-label="Amplitude and phase distortion envelope preview"></canvas>
        </div>

        <div class="tables">
          <section>
            <div class="lane-title">
              <h2>Amplitude</h2>
              <span>level / samples</span>
            </div>
            <div id="ampStages" class="stage-grid"></div>
          </section>
          <section>
            <div class="lane-title">
              <h2>Phase Distortion</h2>
              <span>level / samples</span>
            </div>
            <div id="pdStages" class="stage-grid"></div>
          </section>
        </div>
      </section>

      <aside class="output-panel" aria-label="Export">
        <label>
          MIDI output
          <select id="midiOutput">
            <option value="">No output selected</option>
          </select>
        </label>
        <section class="performance-panel" aria-label="Performance settings">
          <label>
            Ring mod
            <input id="ringControl" type="range" min="0" max="4095" value="0">
          </label>
          <label>
            Noise
            <input id="noiseControl" type="range" min="0" max="4095" value="0">
          </label>
          <label>
            MIDI in ch
            <input id="midiInChannel" type="number" min="1" max="16" value="1">
          </label>
          <label>
            Turing range
            <input id="turingRange" type="number" min="1" max="8" value="2">
          </label>
        </section>
        <div class="output-actions">
          <button id="copyCpp" type="button">Copy C++</button>
          <button id="copySysex" type="button">SysEx</button>
          <button id="sendSysex" type="button" title="Load this envelope until reset">Load</button>
          <button id="flashSysex" type="button" title="Save this envelope after reset">Save</button>
          <button id="deleteSlot" type="button" title="Delete the selected custom slot from card flash">Delete</button>
          <button id="sendSettings" type="button">Set</button>
          <button id="downloadJson" type="button">JSON</button>
          <button id="resetPreset" type="button">Reset</button>
        </div>
        <textarea id="exportText" spellcheck="false" aria-label="Generated firmware preset"></textarea>
        <p id="status" class="status">Ready.</p>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
