id: 84_CosmikC1zzl3
title: Cosmik C1ZZL3
release: 84 / 1.0
summary: Phase-distortion synth, Web MIDI envelopes, USB MIDI, and Turing machine
description: Stable phase-distortion synthesiser and Turing machine firmware with Web MIDI custom envelopes, USB MIDI device/host operation, MIDI CC control, and optional Turing MIDI output.
panel:
  controls:
    main:
      label: Pitch / Mutation
      description: >-
        In synth mode sets oscillator pitch. In Turing mode sets mutation/lock
        behaviour; centre is most random and the extremes are more locked.
      source: curated
    x:
      label: PD / Length
      description: >-
        In synth mode sets phase-distortion amount. In Turing mode chooses loop
        length from 2 to 16 steps. In performance edit it sets ring modulation.
      source: curated
    'y':
      label: Wave / Clock
      description: >-
        In synth mode morphs the waveform. In Turing mode sets the internal
        clock speed. In performance edit it sets noise/grit.
      source: curated
    z:
      label: Synth / Turing / Edit
      description: >-
        Up selects Turing machine, middle selects PD synth, and holding down
        from middle edits detune, ring modulation, and noise. Holding down from
        middle also saves supported performance settings.
      source: curated
  inputs:
    audio_l:
      label: |-
        Audio/CV
        1
      description: 1V/oct pitch modulation in PD synth mode.
      source: curated
    audio_r:
      label: |-
        Audio/CV
        2
      description: Unused in this build.
      source: curated
    cv_1:
      label: |-
        CV
        1
      description: Adds phase-distortion amount in synth and Turing modes.
      source: curated
    cv_2:
      label: |-
        CV
        2
      description: Adds wave control in synth and Turing modes.
      source: curated
    pulse_1:
      label: |-
        Clock
        1
      description: External Turing clock in switch-up mode.
      source: curated
    pulse_2:
      label: |-
        Env
        Trig
      description: Triggers the selected envelope and oscillator sync in synth mode when an active preset is selected.
      source: curated
  outputs:
    audio_out_l:
      label: |-
        Audio
        1
      description: Oscillator 1 in synth mode; self-playing stepped oscillator 1 in Turing mode.
      source: curated
    audio_out_r:
      label: |-
        Audio
        2
      description: Oscillator 2 in synth mode; self-playing stepped oscillator 2 in Turing mode.
      source: curated
    cv_out_1:
      label: |-
        CV
        1
      description: Scaled stepped Turing CV; continues updating in synth mode.
      source: curated
    cv_out_2:
      label: |-
        CV
        2
      description: Smoothed Turing CV; continues updating in synth mode.
      source: curated
    pulse_out_1:
      label: |-
        Pulse
        1
      description: Main Turing pulse; continues updating in synth mode.
      source: curated
    pulse_out_2:
      label: |-
        Pulse
        2
      description: Alternate Turing bit pulse; continues updating in synth mode.
      source: curated
switch_modes:
  up: Turing machine. Main controls mutation, X controls length, and Y controls clock speed.
  middle: PD synth. Main controls pitch, X controls phase-distortion amount, and Y controls waveform morph.
  down: Hold from middle for performance edit and save. Main controls detune, X ring modulation, and Y noise/grit.
leds:
  - "Synth mode: LED 1 phase-distortion amount, LED 2 waveform position, LED 3 oscillator 2 level, LED 4 ring modulation, LED 5 noise amount, LED 6 switch-held indicator."
  - "Turing mode: LEDs 1-3 show low bits of the Turing pattern, LED 4 follows Pulse In 1, LED 5 shows sequence length, and LED 6 flashes on each Turing clock step. Turning X briefly displays length as binary."
  - "Envelope startup selection: factory presets use binary LED display; custom slots light LED 6 and use LEDs 1-3 for the custom slot number."
notes:
  - "Hosted Web MIDI editor: https://soveda.github.io/CozmikC1zzl3/web-midi/editor/"
  - "Factory envelope presets are never overwritten. The card stores custom envelope shapes; names are stored in the browser."
  - "MIDI CC1 controls phase distortion, CC20 detune, CC21 ring modulation, CC22 noise, CC23 waveform, and CC24 Turing CV octave range."
  - "The Turing clock continues running in synth mode, so CV and pulse outputs keep updating while the synth voice is playable."
  - "This stable production build uses a 192 MHz RP2040 clock and was hardware-tested with USB MIDI device/host operation, Turing MIDI output, settings readback, and MIDI CC control."
source:
