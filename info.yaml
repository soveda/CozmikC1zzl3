draft: true
Name: Cosmik C1ZZL3
Description: Stable phase-distortion synthesiser and Turing machine firmware with gate-held Web MIDI envelopes, CZ Import Lab handoff, PD, detune, eight waveform families, USB MIDI device/host operation, and optional Turing MIDI output.
Language: C++ (Pico SDK)
Creator: Adrian Vos
Version: 1.2
Status: Released
License: MIT
Editor: https://soveda.github.io/CozmikC1zzl3/web-midi/editor/

tags:
  - synth
  - midi
  - web-midi
  - turing-machine
  - phase-distortion

manual: |
  Phase-distortion synth card with Turing machine mode, USB MIDI, browser Envelope Lab, and C1ZZL3 Import Lab handoff.
  Switch middle is PD synth mode (Main = pitch, X = phase distortion, Y = waveform morph).
  Pulse In 2 and MIDI note-on hold the selected envelope until gate/note-off starts the release stage.
  Hold switch down from middle for performance edit (detune, ring modulation, noise/grit) and save.
  Switch up is Turing mode (Main = mutation, X = length, Y = clock speed).
  Turing CV and pulse outputs continue running in synth mode.
  Factory envelope presets are never overwritten; custom envelopes use separate browser-stored slots.

panel:
  inputs:
    - id: AudioIn1
      name: Pitch CV
      description: 1V/oct pitch modulation in PD synth mode
    - id: CVIn1
      name: Phase Distortion CV
      description: Adds phase-distortion amount in synth and Turing modes
    - id: CVIn2
      name: Wave Control CV
      description: Adds wave control in synth and Turing modes
    - id: PulseIn1
      name: External Turing Clock
      description: External Turing clock in switch-up mode
    - id: PulseIn2
      name: Envelope Trigger
      description: Triggers and holds the selected envelope in synth mode; release starts on gate-off
  outputs:
    - id: AudioOut1
      name: Oscillator 1 / Turing Voice A
      description: Oscillator 1 in synth mode; self-playing stepped oscillator 1 in Turing mode
    - id: AudioOut2
      name: Oscillator 2 / Turing Voice B
      description: Oscillator 2 in synth mode; self-playing stepped oscillator 2 in Turing mode
    - id: CVOut1
      name: Stepped Turing CV
      description: Scaled stepped Turing CV; continues updating in synth mode
    - id: CVOut2
      name: Smoothed Turing CV
      description: Smoothed Turing CV; continues updating in synth mode
    - id: PulseOut1
      name: Main Turing Pulse
      description: Main Turing pulse; continues updating in synth mode
    - id: PulseOut2
      name: Alternate Turing Pulse
      description: Alternate Turing bit pulse; continues updating in synth mode

controls:
  knobs:
    - when: { z: middle }
      main:
        name: Pitch
        description: Oscillator pitch in synth mode
      x:
        name: Phase Distortion
        description: Phase-distortion amount
      y:
        name: Waveform Morph
        description: Waveform selection/morph
    - when: { z: up }
      main:
        name: Mutation
        description: Turing mutation/lock behaviour; centre is most random
      x:
        name: Sequence Length
        description: Loop length from 2 to 16 steps
      y:
        name: Clock Speed
        description: Internal Turing clock speed
    - when: { z: down, gesture: hold }
      main:
        name: Detune
        description: Oscillator 2 detune in performance edit
      x:
        name: Ring Modulation
        description: Ring modulation amount in performance edit
      y:
        name: Noise/Grit
        description: Noise/grit amount in performance edit
  switches:
    - id: Z
      up:
        name: Turing Machine
        description: Turing mode with stepped/smoothed CV and pulse outputs
      middle:
        name: PD Synth
        description: Phase-distortion synth voice mode
      down:
        name: Performance Edit
        description: Hold from middle to edit detune, ring mod, and noise; save supported settings

  leds:
    - when: { z: middle }
      display: list
      items:
        - id: LED0
          name: Phase Distortion Amount
        - id: LED1
          name: Waveform Position
        - id: LED2
          name: Oscillator 2 Level
        - id: LED3
          name: Ring Modulation
        - id: LED4
          name: Noise Amount
        - id: LED5
          name: Switch Held Indicator
    - when: { z: up }
      display: list
      items:
        - id: LED0
          name: Turing Bit 0
        - id: LED1
          name: Turing Bit 1
        - id: LED2
          name: Turing Bit 2
        - id: LED3
          name: External Clock Follow
        - id: LED4
          name: Sequence Length
        - id: LED5
          name: Turing Clock Step

host:
  usb:
    - name: Web MIDI Envelope Editor
      role: editor
      description: Browser editor for custom envelopes and performance settings
  notes: |
    MIDI CC1 controls phase distortion, CC20 detune, CC21 ring modulation, CC22 noise,
    CC23 waveform, and CC24 Turing CV octave range.
